<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>开始页</title>
  <style>
    :root {
      --bg: #eef7ff;
      --bg-soft: #f8fcff;
      --panel: rgba(255, 255, 255, 0.78);
      --line: rgba(129, 167, 203, 0.28);
      --text: #2a3c52;
      --muted: #6f869f;
      --primary: #5f93ff;
      --shadow: 0 10px 30px rgba(100, 142, 188, 0.18);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 10% 12%, #d8ecff 0, transparent 30%),
        radial-gradient(circle at 88% 8%, #d9f5ff 0, transparent 28%),
        linear-gradient(180deg, var(--bg), var(--bg-soft));
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px 16px;
    }

    .page {
      width: min(980px, 100%);
      display: grid;
      gap: 16px;
    }

    .start-panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px);
      padding: 28px 24px;
      text-align: center;
    }

    .title {
      margin: 0;
      font-size: 34px;
      letter-spacing: 0.6px;
      color: #2d4a66;
    }

    .subtitle {
      margin: 8px 0 18px;
      color: var(--muted);
      font-size: 14px;
    }

    .search-wrap {
      max-width: 700px;
      margin: 0 auto 22px;
    }

    .search {
      display: flex;
      align-items: center;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #ffffff;
      overflow: hidden;
      box-shadow: 0 6px 20px rgba(145, 180, 216, 0.18);
    }

    .search input {
      flex: 1;
      border: none;
      outline: none;
      padding: 14px 18px;
      font-size: 15px;
      color: var(--text);
      background: transparent;
    }

    .search input::placeholder { color: #95abc2; }

    .search button {
      border: none;
      background: linear-gradient(135deg, #7bb0ff, var(--primary));
      color: #fff;
      font-size: 14px;
      padding: 11px 20px;
      margin-right: 6px;
      border-radius: 999px;
      cursor: pointer;
    }

    .apps-title {
      margin: 0 0 12px;
      text-align: left;
      font-size: 16px;
      color: #4d6784;
    }

    .apps {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 10px;
    }

    .app {
      text-decoration: none;
      color: inherit;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.8);
      padding: 10px;
      display: grid;
      justify-items: center;
      gap: 8px;
      transition: transform .15s ease, box-shadow .2s ease;
    }

    .app:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(126, 166, 207, 0.2);
    }

    .icon {
      width: 42px;
      height: 42px;
      border-radius: 11px;
      display: grid;
      place-items: center;
      background: #f1f7ff;
      border: 1px solid #dbe9f8;
      overflow: hidden;
    }

    .icon img {
      width: 24px;
      height: 24px;
      object-fit: contain;
    }

    .fallback {
      display: none;
      font-size: 17px;
      font-weight: 700;
      color: #4f74a7;
    }

    .app span {
      font-size: 13px;
      color: #46607e;
    }

    .notes {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 20px;
      box-shadow: var(--shadow);
      padding: 16px;
    }

    .notes-head {
      margin: 0 0 8px;
      font-size: 15px;
      color: #4d6784;
    }

    textarea {
      width: 100%;
      min-height: 130px;
      resize: vertical;
      border-radius: 12px;
      border: 1px solid #d5e6f8;
      background: #fff;
      color: var(--text);
      padding: 10px 12px;
      line-height: 1.6;
      font-size: 14px;
      outline: none;
    }

    .notes-actions {
      margin-top: 10px;
      display: flex;
      justify-content: flex-end;
    }

    .notes-actions button {
      border: 1px solid #c8def5;
      background: #f3f9ff;
      color: #4c6a89;
      border-radius: 10px;
      padding: 8px 12px;
      cursor: pointer;
    }

    .tip {
      margin-top: 8px;
      font-size: 12px;
      color: #82a0be;
    }

    @media (max-width: 860px) {
      .title { font-size: 29px; }
      .apps { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    }

    @media (max-width: 520px) {
      .start-panel { padding: 20px 14px; }
      .apps { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .search button { padding: 10px 14px; }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="start-panel">
      <h1 class="title">🌿 我的开始页</h1>
      <p class="subtitle">像普通浏览器起始页一样：上方搜索，下方应用。</p>

      <div class="search-wrap">
        <form class="search" action="https://cn.bing.com/search" method="get" target="_blank">
          <input type="text" name="q" placeholder="在 CNBing 中搜索..." />
          <button type="submit">搜索</button>
        </form>
      </div>

      <h2 class="apps-title">常用应用</h2>
      <div class="apps">
        <a class="app" href="https://www.luogu.com.cn" target="_blank" rel="noopener noreferrer">
          <div class="icon">
            <img src="https://www.google.com/s2/favicons?sz=64&domain=www.luogu.com.cn" alt="洛谷图标" onerror="this.style.display='none';this.nextElementSibling.style.display='inline';" />
            <span class="fallback">洛</span>
          </div>
          <span>洛谷</span>
        </a>

        <a class="app" href="https://bbcoj.cn" target="_blank" rel="noopener noreferrer">
          <div class="icon">
            <img src="https://www.google.com/s2/favicons?sz=64&domain=bbcoj.cn" alt="BBCOJ图标" onerror="this.style.display='none';this.nextElementSibling.style.display='inline';" />
            <span class="fallback">B</span>
          </div>
          <span>BBCOJ</span>
        </a>

        <a class="app" href="https://chat.openai.com" target="_blank" rel="noopener noreferrer">
          <div class="icon">
            <img src="https://www.google.com/s2/favicons?sz=64&domain=chat.openai.com" alt="ChatGPT图标" onerror="this.style.display='none';this.nextElementSibling.style.display='inline';" />
            <span class="fallback">G</span>
          </div>
          <span>ChatGPT</span>
        </a>

        <a class="app" href="https://www.deepseek.com" target="_blank" rel="noopener noreferrer">
          <div class="icon">
            <img src="https://www.google.com/s2/favicons?sz=64&domain=www.deepseek.com" alt="DeepSeek图标" onerror="this.style.display='none';this.nextElementSibling.style.display='inline';" />
            <span class="fallback">D</span>
          </div>
          <span>DeepSeek</span>
        </a>

        <a class="app" href="https://www.doubao.com" target="_blank" rel="noopener noreferrer">
          <div class="icon">
            <img src="https://www.google.com/s2/favicons?sz=64&domain=www.doubao.com" alt="豆包图标" onerror="this.style.display='none';this.nextElementSibling.style.display='inline';" />
            <span class="fallback">豆</span>
          </div>
          <span>豆包</span>
        </a>
      </div>
    </section>

    <section class="notes">
      <h2 class="notes-head">📝 记事本（自动保存）</h2>
      <textarea id="memo" placeholder="写点今天要做的事...\n内容会自动保存。"></textarea>
      <div class="notes-actions">
        <button id="clearBtn" type="button">清空记事</button>
      </div>
      <div class="tip">已删除“保存笔记”按钮，输入即自动保存到本地。</div>
    </section>
  </main>

  <script>
    const STORAGE_KEY = "start_page_notes";
    const memo = document.getElementById("memo");
    const clearBtn = document.getElementById("clearBtn");

    memo.value = localStorage.getItem(STORAGE_KEY) || "";

    memo.addEventListener("input", () => {
      localStorage.setItem(STORAGE_KEY, memo.value);
    });

    clearBtn.addEventListener("click", () => {
      memo.value = "";
      localStorage.removeItem(STORAGE_KEY);
    });
  </script>
</body>
</html>
