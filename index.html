<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>我的个人导览页</title>
  <style>
    :root {
      --bg-1: #0b1020;
      --bg-2: #1c2a62;
      --glass: rgba(255, 255, 255, 0.12);
      --glass-border: rgba(255, 255, 255, 0.2);
      --text: #f4f6ff;
      --muted: #cbd2ff;
      --primary: #7f8cff;
      --shadow: 0 16px 36px rgba(0, 0, 0, 0.35);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background:
        radial-gradient(circle at 15% 20%, rgba(91, 114, 255, 0.35), transparent 35%),
        radial-gradient(circle at 85% 10%, rgba(0, 200, 255, 0.22), transparent 34%),
        linear-gradient(135deg, var(--bg-1), var(--bg-2));
      padding: 24px;
    }

    .container {
      max-width: 1120px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1.35fr 1fr;
      gap: 18px;
    }

    .panel {
      background: var(--glass);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(14px);
      border-radius: 18px;
      box-shadow: var(--shadow);
      padding: 20px;
    }

    .hero h1 {
      margin: 0;
      font-size: 32px;
      line-height: 1.25;
      letter-spacing: 0.4px;
    }

    .hero p {
      margin: 10px 0 18px;
      color: var(--muted);
      font-size: 14px;
    }

    .search {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    .search input {
      flex: 1;
      min-width: 180px;
      border: 1px solid rgba(255,255,255,.25);
      border-radius: 12px;
      background: rgba(255,255,255,.08);
      color: #fff;
      padding: 12px 14px;
      outline: none;
      font-size: 15px;
    }

    .search input::placeholder { color: #dce1ff; }

    .search button {
      border: 0;
      border-radius: 12px;
      padding: 12px 16px;
      color: #fff;
      background: linear-gradient(135deg, #8b96ff, #5f73ff);
      cursor: pointer;
      font-size: 15px;
    }

    .section-title {
      margin: 0 0 10px;
      font-size: 19px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .card {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: inherit;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.16);
      border-radius: 14px;
      padding: 10px;
      transition: transform .15s ease, background .15s ease;
    }

    .card:hover {
      transform: translateY(-2px);
      background: rgba(255,255,255,.15);
    }

    .icon-box {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      display: grid;
      place-items: center;
      background: rgba(255,255,255,.2);
      overflow: hidden;
      flex-shrink: 0;
    }

    .icon-box img {
      width: 24px;
      height: 24px;
      object-fit: contain;
    }

    .icon-fallback {
      font-size: 17px;
      font-weight: 700;
      color: #fff;
      display: none;
    }

    .card b {
      display: block;
      margin-bottom: 3px;
      font-size: 15px;
    }

    .card small {
      color: #cfd6ff;
      font-size: 12px;
      word-break: break-all;
    }

    .notes {
      display: flex;
      flex-direction: column;
      min-height: 420px;
    }

    textarea {
      flex: 1;
      width: 100%;
      min-height: 300px;
      resize: vertical;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,.22);
      background: rgba(10, 14, 40, .45);
      color: #f5f7ff;
      padding: 12px;
      line-height: 1.6;
      font-size: 14px;
      outline: none;
    }

    .actions {
      margin-top: 10px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .actions button {
      border: none;
      border-radius: 10px;
      padding: 9px 14px;
      color: #fff;
      background: var(--primary);
      cursor: pointer;
    }

    .actions .ghost {
      background: rgba(255,255,255,.2);
    }

    .tip {
      margin-top: 8px;
      color: #c8d0ff;
      font-size: 12px;
    }

    @media (max-width: 920px) {
      .container { grid-template-columns: 1fr; }
      .hero h1 { font-size: 27px; }
    }
  </style>
</head>
<body>
  <main class="container">
    <section class="panel hero">
      <h1>✨ 我的导航博客首页</h1>
      <p>常用网站、CNBing 搜索、记事本都在这里，一页搞定。</p>

      <form class="search" action="https://cn.bing.com/search" method="get" target="_blank">
        <input name="q" type="text" placeholder="用 CNBing 搜点东西吧..." />
        <button type="submit">🔍 搜索</button>
      </form>

      <h2 class="section-title">常用网站</h2>
      <div class="grid">
        <a class="card" href="https://www.luogu.com.cn" target="_blank" rel="noopener noreferrer">
          <div class="icon-box">
            <img src="https://www.google.com/s2/favicons?sz=64&domain=www.luogu.com.cn" alt="洛谷图标" onerror="this.style.display='none';this.nextElementSibling.style.display='inline';" />
            <span class="icon-fallback">洛</span>
          </div>
          <div><b>洛谷</b><small>www.luogu.com.cn</small></div>
        </a>

        <a class="card" href="https://bbcoj.cn" target="_blank" rel="noopener noreferrer">
          <div class="icon-box">
            <img src="https://www.google.com/s2/favicons?sz=64&domain=bbcoj.cn" alt="BBCOJ图标" onerror="this.style.display='none';this.nextElementSibling.style.display='inline';" />
            <span class="icon-fallback">B</span>
          </div>
          <div><b>BBCOJ</b><small>bbcoj.cn</small></div>
        </a>

        <a class="card" href="https://chat.openai.com" target="_blank" rel="noopener noreferrer">
          <div class="icon-box">
            <img src="https://www.google.com/s2/favicons?sz=64&domain=chat.openai.com" alt="ChatGPT图标" onerror="this.style.display='none';this.nextElementSibling.style.display='inline';" />
            <span class="icon-fallback">G</span>
          </div>
          <div><b>ChatGPT</b><small>chat.openai.com</small></div>
        </a>

        <a class="card" href="https://www.deepseek.com" target="_blank" rel="noopener noreferrer">
          <div class="icon-box">
            <img src="https://www.google.com/s2/favicons?sz=64&domain=www.deepseek.com" alt="DeepSeek图标" onerror="this.style.display='none';this.nextElementSibling.style.display='inline';" />
            <span class="icon-fallback">D</span>
          </div>
          <div><b>DeepSeek</b><small>www.deepseek.com</small></div>
        </a>

        <a class="card" href="https://www.doubao.com" target="_blank" rel="noopener noreferrer">
          <div class="icon-box">
            <img src="https://www.google.com/s2/favicons?sz=64&domain=www.doubao.com" alt="豆包图标" onerror="this.style.display='none';this.nextElementSibling.style.display='inline';" />
            <span class="icon-fallback">豆</span>
          </div>
          <div><b>豆包</b><small>www.doubao.com</small></div>
        </a>
      </div>
    </section>

    <section class="panel notes">
      <h2 class="section-title">📝 记事本</h2>
      <textarea id="memo" placeholder="写计划、记灵感、列待办……\n输入会自动保存。"></textarea>
      <div class="actions">
        <button type="button" id="saveBtn">保存笔记</button>
        <button type="button" id="clearBtn" class="ghost">清空笔记</button>
      </div>
      <div class="tip">提示：内容会保存在浏览器本地 localStorage，刷新页面不会丢失。</div>
    </section>
  </main>

  <script>
    const STORAGE_KEY = "personal_nav_notes";
    const memo = document.getElementById("memo");
    const saveBtn = document.getElementById("saveBtn");
    const clearBtn = document.getElementById("clearBtn");

    memo.value = localStorage.getItem(STORAGE_KEY) || "";

    function saveNote() {
      localStorage.setItem(STORAGE_KEY, memo.value);
      saveBtn.textContent = "已保存 ✅";
      setTimeout(() => (saveBtn.textContent = "保存笔记"), 1200);
    }

    memo.addEventListener("input", () => {
      localStorage.setItem(STORAGE_KEY, memo.value);
    });

    saveBtn.addEventListener("click", saveNote);

    clearBtn.addEventListener("click", () => {
      memo.value = "";
      localStorage.removeItem(STORAGE_KEY);
    });
  </script>
</body>
</html>
