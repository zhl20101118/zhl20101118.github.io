<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>我的导览博客页</title>
  <style>
    :root {
      --bg: #f6f9ff;
      --bg-soft: #eef4ff;
      --card: rgba(255, 255, 255, 0.9);
      --card-border: rgba(147, 176, 255, 0.3);
      --text: #1d2b53;
      --muted: #5f6f99;
      --primary: #5c7cff;
      --primary-strong: #4668f5;
      --shadow: 0 12px 30px rgba(59, 93, 201, 0.18);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 10% 0%, #dbe7ff 0, transparent 35%),
        radial-gradient(circle at 95% 5%, #dff8ff 0, transparent 30%),
        linear-gradient(180deg, var(--bg), #f9fbff 55%, #f2f7ff 100%);
      padding: 28px;
    }

    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1.2fr 1fr;
      gap: 20px;
    }

    .panel {
      backdrop-filter: blur(10px);
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 18px;
      box-shadow: var(--shadow);
      padding: 22px;
    }

    .hero h1 {
      margin: 0;
      font-size: 32px;
      line-height: 1.2;
      letter-spacing: 0.4px;
    }

    .hero p {
      color: var(--muted);
      margin: 10px 0 20px;
      font-size: 15px;
    }

    .search-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .search-row input {
      flex: 1;
      min-width: 180px;
      border: 1px solid #c4d4ff;
      background: var(--bg-soft);
      border-radius: 12px;
      padding: 12px 14px;
      color: var(--text);
      font-size: 15px;
      outline: none;
    }

    .search-row input::placeholder {
      color: #8392bb;
    }

    .search-row button {
      border: none;
      border-radius: 12px;
      padding: 12px 18px;
      font-size: 15px;
      background: linear-gradient(135deg, var(--primary), var(--primary-strong));
      color: #fff;
      cursor: pointer;
      transition: transform 0.15s ease;
    }

    .search-row button:hover {
      transform: translateY(-1px);
    }

    .section-title {
      margin: 0 0 14px;
      font-size: 20px;
      color: #1c2a56;
    }

    .link-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .site-card {
      text-decoration: none;
      color: inherit;
      border-radius: 14px;
      border: 1px solid #d8e3ff;
      background: #f8fbff;
      padding: 12px;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: all 0.18s ease;
    }

    .site-card:hover {
      transform: translateY(-2px);
      border-color: #adc4ff;
      background: #f0f6ff;
    }

    .icon {
      width: 38px;
      height: 38px;
      border-radius: 11px;
      display: grid;
      place-items: center;
      font-size: 17px;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
    }

    .luogu { background: linear-gradient(135deg, #2d9bff, #1f70d9); }
    .bbcoj { background: linear-gradient(135deg, #7a63ff, #4b39ca); }
    .chatgpt { background: linear-gradient(135deg, #26b18d, #16866a); }
    .deepseek { background: linear-gradient(135deg, #4c88ff, #2956c2); }
    .doubao { background: linear-gradient(135deg, #ff9f2d, #f0702d); }

    .site-meta b {
      display: block;
      font-size: 15px;
      margin-bottom: 3px;
    }

    .site-meta span {
      font-size: 12px;
      color: #6778a6;
      word-break: break-all;
    }

    .notes {
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .notes textarea {
      flex: 1;
      min-height: 280px;
      resize: vertical;
      border-radius: 12px;
      border: 1px solid #c5d6ff;
      background: #f2f7ff;
      color: #263662;
      padding: 12px;
      font-size: 14px;
      line-height: 1.6;
      outline: none;
    }

    .notes .actions {
      margin-top: 12px;
      display: flex;
      gap: 10px;
    }

    .notes button {
      border: none;
      border-radius: 10px;
      padding: 9px 14px;
      cursor: pointer;
      color: #fff;
      background: #5f73ff;
    }

    .notes button.secondary {
      background: #9aa9cf;
    }

    .tips {
      margin-top: 10px;
      color: #61729f;
      font-size: 12px;
    }

    @media (max-width: 920px) {
      .wrap {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="panel hero">
      <h1>✨ 我的个人导览博客页</h1>
      <p>集成了常用网站快捷入口、CNBing 搜索和本地记事本，打开页面即可高效开始一天。</p>

      <form
        class="search-row"
        action="https://cn.bing.com/search"
        method="get"
        target="_blank"
        rel="noopener noreferrer"
      >
        <input type="text" name="q" placeholder="在 CNBing 中搜索你想了解的内容..." />
        <button type="submit">🔍 搜索</button>
      </form>

      <h2 class="section-title" style="margin-top:22px;">常用网站</h2>
      <div class="link-grid">
        <a class="site-card" href="https://www.luogu.com.cn" target="_blank" rel="noopener noreferrer">
          <div class="icon luogu">洛</div>
          <div class="site-meta"><b>洛谷</b><span>www.luogu.com.cn</span></div>
        </a>

        <a class="site-card" href="https://bbcoj.cn" target="_blank" rel="noopener noreferrer">
          <div class="icon bbcoj">B</div>
          <div class="site-meta"><b>BBCOJ</b><span>bbcoj.cn</span></div>
        </a>

        <a class="site-card" href="https://chat.openai.com" target="_blank" rel="noopener noreferrer">
          <div class="icon chatgpt">G</div>
          <div class="site-meta"><b>ChatGPT</b><span>chat.openai.com</span></div>
        </a>

        <a class="site-card" href="https://www.deepseek.com" target="_blank" rel="noopener noreferrer">
          <div class="icon deepseek">D</div>
          <div class="site-meta"><b>DeepSeek</b><span>www.deepseek.com</span></div>
        </a>

        <a class="site-card" href="https://www.doubao.com" target="_blank" rel="noopener noreferrer">
          <div class="icon doubao">豆</div>
          <div class="site-meta"><b>豆包</b><span>www.doubao.com</span></div>
        </a>
      </div>
    </section>

    <section class="panel notes">
      <h2 class="section-title">📝 记事本</h2>
      <textarea id="memo" placeholder="写下今天的计划、灵感、待办事项...

支持自动保存到浏览器本地。"></textarea>
      <div class="actions">
        <button id="saveBtn" type="button">保存笔记</button>
        <button id="clearBtn" class="secondary" type="button">清空笔记</button>
      </div>
      <div class="tips">提示：内容会自动保存到本地（localStorage），刷新后不会丢失。</div>
    </section>
  </main>

  <script>
    const KEY = "my_blog_navigation_notes";
    const memo = document.getElementById("memo");
    const saveBtn = document.getElementById("saveBtn");
    const clearBtn = document.getElementById("clearBtn");

    memo.value = localStorage.getItem(KEY) || "";

    function saveMemo() {
      localStorage.setItem(KEY, memo.value);
      saveBtn.textContent = "已保存 ✅";
      setTimeout(() => {
        saveBtn.textContent = "保存笔记";
      }, 1200);
    }

    saveBtn.addEventListener("click", saveMemo);

    memo.addEventListener("input", () => {
      localStorage.setItem(KEY, memo.value);
    });

    clearBtn.addEventListener("click", () => {
      memo.value = "";
      localStorage.removeItem(KEY);
    });
  </script>
</body>
</html>
