<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>主页导航</title>
  <style>
    :root {
      --bg-1: #eafcff;
      --bg-2: #d9f6ff;
      --bg-3: #e7ffe9;
      --card: rgba(255, 255, 255, 0.82);
      --card-border: rgba(88, 180, 156, 0.28);
      --text: #17465f;
      --muted: #587d8f;
      --blue: #269fdf;
      --green: #39b980;
      --blue-dark: #2f6dff;
      --shadow: 0 20px 45px rgba(37, 143, 177, 0.16);
      --radius: 22px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 10% 8%, rgba(119, 238, 194, 0.3), transparent 36%),
        radial-gradient(circle at 85% 10%, rgba(86, 164, 255, 0.28), transparent 38%),
        linear-gradient(145deg, var(--bg-1), var(--bg-2) 60%, var(--bg-3));
      padding: 28px 16px;
    }

    .container {
      width: min(980px, 100%);
      margin: 0 auto;
      display: grid;
      gap: 16px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: var(--radius);
      backdrop-filter: blur(10px);
      box-shadow: var(--shadow);
      padding: 24px;
    }

    .hero {
      position: relative;
      overflow: hidden;
    }

    .hero::after {
      content: "";
      position: absolute;
      width: 260px;
      height: 260px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(85, 209, 137, 0.2), rgba(85, 209, 137, 0));
      right: -90px;
      top: -110px;
      pointer-events: none;
    }

    .tag {
      display: inline-block;
      font-size: 13px;
      color: #117f56;
      background: rgba(80, 201, 141, 0.18);
      border: 1px solid rgba(73, 183, 126, 0.35);
      border-radius: 999px;
      padding: 6px 12px;
    }

    h1 {
      margin: 12px 0 8px;
      font-size: clamp(30px, 4vw, 42px);
      letter-spacing: .3px;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
      font-size: 15px;
    }

    .search {
      margin-top: 16px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .search input {
      flex: 1;
      min-width: 230px;
      border: 1px solid rgba(49, 155, 178, 0.3);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.92);
      color: var(--text);
      padding: 13px 14px;
      font-size: 15px;
      outline: none;
    }

    .search button {
      border: none;
      border-radius: 14px;
      padding: 12px 20px;
      font-size: 15px;
      color: #fff;
      cursor: pointer;
      background: linear-gradient(115deg, var(--green), var(--blue-dark));
      box-shadow: 0 10px 24px rgba(53, 137, 188, 0.32);
    }

    .clock {
      margin-top: 10px;
      color: #1a8f67;
      font-size: 14px;
      font-weight: 600;
    }

    h2 { margin: 0 0 14px; font-size: 21px; }

    .links {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 12px;
    }

    .site {
      text-decoration: none;
      color: inherit;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 13px;
      border-radius: 14px;
      border: 1px solid rgba(64, 165, 161, 0.24);
      background: rgba(255, 255, 255, 0.78);
      transition: transform .2s ease, box-shadow .2s ease, border-color .2s ease;
    }

    .site:hover {
      transform: translateY(-2px);
      border-color: rgba(49, 152, 150, 0.5);
      box-shadow: 0 10px 18px rgba(70, 160, 168, 0.2);
    }

    .icon {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      display: grid;
      place-items: center;
      flex-shrink: 0;
      background: #fff;
      border: 1px solid rgba(79, 161, 189, 0.2);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.7);
    }

    .icon svg { width: 24px; height: 24px; display: block; }

    .luogu svg { fill: #2c8fff; }
    .bbcoj svg { fill: #5865f2; }
    .chatgpt svg { fill: #10a37f; }
    .deepseek svg { fill: #2f70f7; }
    .doubao svg { fill: #f28a2a; }

    .site strong { font-size: 16px; }
    .site small { color: var(--muted); display: block; margin-top: 2px; }

    .footer {
      text-align: center;
      color: #4a7f7a;
      font-size: 13px;
      padding: 2px 0;
