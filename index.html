<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>清新开始页</title>
  <style>
    :root {
      --bg-top: #ecf9ff;
      --bg-bottom: #f8fffb;
      --card: rgba(255, 255, 255, 0.82);
      --line: rgba(129, 179, 160, 0.25);
      --text: #2d4f4a;
      --muted: #6b948d;
      --primary: #4fb79c;
      --primary-2: #3ea98d;
      --shadow: 0 12px 28px rgba(95, 162, 146, 0.18);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 12% 15%, #d8f7ff 0, transparent 35%),
        radial-gradient(circle at 88% 8%, #dcffe9 0, transparent 32%),
        linear-gradient(180deg, var(--bg-top), var(--bg-bottom));
      display: grid;
      place-items: center;
      padding: 24px 14px;
    }

    .start {
      width: min(980px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 26px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      padding: 30px 24px 24px;
    }

    .title {
      margin: 0;
      text-align: center;
      font-size: 36px;
      color: #2b6157;
      letter-spacing: 0.5px;
    }

    .subtitle {
      margin: 10px 0 22px;
      text-align: center;
      color: var(--muted);
      font-size: 14px;
    }

    .search-wrap {
      max-width: 720px;
      margin: 0 auto 26px;
    }

    .search {
      display: flex;
      align-items: center;
      background: #fff;
      border: 1px solid #d2eee6;
      border-radius: 999px;
      padding: 6px;
      box-shadow: 0 8px 22px rgba(121, 186, 169, 0.17);
    }

    .search input {
      flex: 1;
      border: none;
      outline: none;
      background: transparent;
      color: var(--text);
      font-size: 15px;
      padding: 10px 14px;
    }

    .search input::placeholder { color: #8eb4ad; }

    .search button {
      border: none;
      border-radius: 999px;
      padding: 10px 20px;
      color: #fff;
      background: linear-gradient(135deg, var(--primary), var(--primary-2));
      font-size: 14px;
      cursor: pointer;
    }

    .apps-title {
      margin: 0 0 12px;
      font-size: 16px;
      color: #4e7f76;
    }

    .apps {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 12px;
    }

    .app {
      text-decoration: none;
      color: inherit;
      border: 1px solid #d3ebe4;
      background: rgba(255, 255, 255, 0.9);
      border-radius: 14px;
      padding: 12px 8px;
      display: grid;
      justify-items: center;
      gap: 8px;
      transition: transform .16s ease, box-shadow .16s ease;
    }

    .app:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 18px rgba(115, 176, 161, 0.2);
    }

    .icon {
      width: 42px;
      height: 42px;
      border-radius: 11px;
      background: #eefaf6;
      border: 1px solid #d8efe8;
      display: grid;
      place-items: center;
      overflow: hidden;
    }

    .icon img {
      width: 24px;
      height: 24px;
      object-fit: contain;
    }

    .fallback {
      display: none;
      font-size: 17px;
      font-weight: 700;
      color: #4c8f81;
    }

    .app span {
      font-size: 13px;
      color: #446f67;
    }

    @media (max-width: 860px) {
      .title { font-size: 30px; }
      .apps { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    }

    @media (max-width: 520px) {
      .start { padding: 22px 14px 16px; }
      .apps { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .search button { padding: 10px 14px; }
    }
  </style>
</head>
<body>
  <main class="start">
    <h1 class="title">🍃 清新开始页</h1>
    <p class="subtitle">上面搜索，下面应用，简洁清爽。</p>

    <div class="search-wrap">
      <form class="search" action="https://cn.bing.com/search" method="get" target="_blank">
        <input type="text" name="q" placeholder="在 CNBing 中搜索..." />
        <button type="submit">搜索</button>
      </form>
    </div>

    <h2 class="apps-title">常用应用</h2>
    <section class="apps">
      <a class="app" href="https://www.luogu.com.cn" target="_blank" rel="noopener noreferrer">
        <div class="icon">
          <img src="https://www.google.com/s2/favicons?sz=64&domain=www.luogu.com.cn" alt="洛谷图标" onerror="this.style.display='none';this.nextElementSibling.style.display='inline';" />
          <span class="fallback">洛</span>
        </div>
        <span>洛谷</span>
      </a>

      <a class="app" href="https://bbcoj.cn" target="_blank" rel="noopener noreferrer">
        <div class="icon">
          <img src="https://www.google.com/s2/favicons?sz=64&domain=bbcoj.cn" alt="BBCOJ图标" onerror="this.style.display='none';this.nextElementSibling.style.display='inline';" />
          <span class="fallback">B</span>
        </div>
        <span>BBCOJ</span>
      </a>

      <a class="app" href="https://chat.openai.com" target="_blank" rel="noopener noreferrer">
        <div class="icon">
          <img src="https://www.google.com/s2/favicons?sz=64&domain=chat.openai.com" alt="ChatGPT图标" onerror="this.style.display='none';this.nextElementSibling.style.display='inline';" />
          <span class="fallback">G</span>
        </div>
        <span>ChatGPT</span>
      </a>

      <a class="app" href="https://www.deepseek.com" target="_blank" rel="noopener noreferrer">
        <div class="icon">
          <img src="https://www.google.com/s2/favicons?sz=64&domain=www.deepseek.com" alt="DeepSeek图标" onerror="this.style.display='none';this.nextElementSibling.style.display='inline';" />
          <span class="fallback">D</span>
        </div>
        <span>DeepSeek</span>
      </a>

      <a class="app" href="https://www.doubao.com" target="_blank" rel="noopener noreferrer">
        <div class="icon">
          <img src="https://www.google.com/s2/favicons?sz=64&domain=www.doubao.com" alt="豆包图标" onerror="this.style.display='none';this.nextElementSibling.style.display='inline';" />
          <span class="fallback">豆</span>
        </div>
        <span>豆包</span>
      </a>
    </section>
  </main>
</body>
</html>
